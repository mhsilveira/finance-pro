service: personal-finance-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  environment:
    NODE_ENV: ${self:provider.stage}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: '*'

plugins:
  - serverless-dotenv-plugin
  - serverless-plugin-typescript
  - serverless-offline

functions:
  createTransaction:
    handler: src/interface/lambda/createTransaction.handler
    events:
      - http:
          path: transactions
          method: post
          cors: true

  getTransactions:
    handler: src/interface/lambda/getTransactions.handler
    events:
      - http:
          path: transactions
          method: get
          cors: true

  getTransactionById:
    handler: src/interface/lambda/getTransactionById.handler
    events:
      - http:
          path: transactions/{id}
          method: get
          cors: true

  updateTransaction:
    handler: src/interface/lambda/updateTransaction.handler
    events:
      - http:
          path: transactions/{id}
          method: put
          cors: true

  deleteTransaction:
    handler: src/interface/lambda/deleteTransaction.handler
    events:
      - http:
          path: transactions/{id}
          method: delete
          cors: true

  deleteAllTransactions:
    handler: src/interface/lambda/deleteAllTransactions.handler
    timeout: 30
    events:
      - http:
          path: transactions
          method: delete
          cors: true

  getReports:
      handler: src/interface/lambda/getReports.handler
      events:
        - http:
            path: reports
            method: get
            cors: true

  getCategories:
    handler: src/interface/lambda/getCategories.handler
    events:
      - http:
          path: categories
          method: get
          cors: true

  reprocessCategories:
    handler: src/interface/lambda/reprocessCategories.handler
    timeout: 60
    events:
      - http:
          path: transactions/reprocess-categories
          method: post
          cors: true

  getCategoryCorrections:
    handler: src/interface/lambda/categoryCorrections.getHandler
    events:
      - http:
          path: category-corrections
          method: get
          cors: true

  saveCategoryCorrection:
    handler: src/interface/lambda/categoryCorrections.postHandler
    events:
      - http:
          path: category-corrections
          method: post
          cors: true

  getTransactionStats:
    handler: src/interface/lambda/getTransactionStats.handler
    events:
      - http:
          path: transactions/stats
          method: get
          cors: true

  batchCreateTransactions:
    handler: src/interface/lambda/batchCreateTransactions.handler
    timeout: 60
    events:
      - http:
          path: transactions/batch
          method: post
          cors: true

  createCategory:
    handler: src/interface/lambda/manageCategories.createHandler
    events:
      - http:
          path: categories
          method: post
          cors: true

  updateCategory:
    handler: src/interface/lambda/manageCategories.updateHandler
    events:
      - http:
          path: categories/{key}
          method: put
          cors: true

  deleteCategory:
    handler: src/interface/lambda/manageCategories.deleteHandler
    events:
      - http:
          path: categories/{key}
          method: delete
          cors: true

  categorizeTransactions:
    handler: src/interface/lambda/categorizeTransactions.handler
    timeout: 120
    events:
      - http:
          path: ai/categorize
          method: post
          cors: true

  generateInsights:
    handler: src/interface/lambda/generateInsights.handler
    timeout: 120
    events:
      - http:
          path: ai/insights
          method: get
          cors: true

custom:
  serverless-offline:
    httpPort: 3001
  dotenv:
    path: .env