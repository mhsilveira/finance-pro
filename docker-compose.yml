services:
  mongo:
    image: mongo:7
    container_name: financepro-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: financepro-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - IS_OFFLINE=true
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./.env:/app/.env:ro
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: financepro-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
      - /app/.next

volumes:
  mongo-data:
